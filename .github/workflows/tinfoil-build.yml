name: Publish Images and Attest

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  AUTH_PROXY_IMAGE: ghcr.io/deevashwer/container-config-auth-proxy
  OPENCLAW_RUNTIME_IMAGE: ghcr.io/deevashwer/container-config-openclaw-runtime

jobs:
  publish-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      auth_proxy_digest: ${{ steps.auth_proxy.outputs.digest }}
      runtime_digest: ${{ steps.runtime.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Log in to GHCR
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Build and push auth-proxy image
        id: auth_proxy
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: ./auth-proxy
          file: ./auth-proxy/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.AUTH_PROXY_IMAGE }}:${{ github.ref_name }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}
          cache-from: type=gha,scope=auth-proxy
          cache-to: type=gha,mode=max,scope=auth-proxy

      - name: Build and push openclaw-runtime image
        id: runtime
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: ./openclaw-runtime
          file: ./openclaw-runtime/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.OPENCLAW_RUNTIME_IMAGE }}:${{ github.ref_name }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}
          cache-from: type=gha,scope=openclaw-runtime
          cache-to: type=gha,mode=max,scope=openclaw-runtime

  release:
    runs-on: ubuntu-latest
    needs: publish-images
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Ensure GitHub release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --generate-notes --title "$GITHUB_REF_NAME"

      - name: Render release Tinfoil config
        run: |
          python3 .github/scripts/render_release_config.py \
            --input tinfoil-config.yml \
            --output output/release-tinfoil-config.yml \
            --tag "${GITHUB_REF_NAME}" \
            --runtime-image "${OPENCLAW_RUNTIME_IMAGE}" \
            --auth-proxy-image "${AUTH_PROXY_IMAGE}" \
            --runtime-digest "${RUNTIME_DIGEST}" \
            --auth-proxy-digest "${AUTH_PROXY_DIGEST}"
        env:
          AUTH_PROXY_DIGEST: ${{ needs.publish-images.outputs.auth_proxy_digest }}
          RUNTIME_DIGEST: ${{ needs.publish-images.outputs.runtime_digest }}

      - name: Write image refs
        run: |
          cat > output/image-refs.txt <<EOF
          ${OPENCLAW_RUNTIME_IMAGE}:${GITHUB_REF_NAME}@${RUNTIME_DIGEST}
          ${AUTH_PROXY_IMAGE}:${GITHUB_REF_NAME}@${AUTH_PROXY_DIGEST}
          EOF
        env:
          AUTH_PROXY_DIGEST: ${{ needs.publish-images.outputs.auth_proxy_digest }}
          RUNTIME_DIGEST: ${{ needs.publish-images.outputs.runtime_digest }}

      - uses: tinfoilsh/measure-image-action@9733d724326dd6b476335ec513210861894d4cb2 # v0.8.2
        with:
          config-file: ${{ github.workspace }}/output/release-tinfoil-config.yml
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release config and image refs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$GITHUB_REF_NAME" \
            output/release-tinfoil-config.yml \
            output/image-refs.txt \
            --clobber

  sync-repo:
    runs-on: ubuntu-latest
    needs:
      - publish-images
      - release
    permissions:
      contents: write

    steps:
      - name: Checkout default branch
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Update tracked release refs
        run: |
          python3 .github/scripts/sync_release_refs.py \
            --tag "${GITHUB_REF_NAME}" \
            --runtime-image "${OPENCLAW_RUNTIME_IMAGE}" \
            --auth-proxy-image "${AUTH_PROXY_IMAGE}" \
            --runtime-digest "${RUNTIME_DIGEST}" \
            --auth-proxy-digest "${AUTH_PROXY_DIGEST}"
        env:
          AUTH_PROXY_DIGEST: ${{ needs.publish-images.outputs.auth_proxy_digest }}
          RUNTIME_DIGEST: ${{ needs.publish-images.outputs.runtime_digest }}

      - name: Commit and push tracked release refs
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if git diff --quiet -- tinfoil-config.yml README.md; then
            echo "No tracked release refs changed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tinfoil-config.yml README.md
          git commit -m "Sync release refs for ${GITHUB_REF_NAME}"
          if ! git fetch origin "${DEFAULT_BRANCH}"; then
            echo "::warning::Failed to fetch ${DEFAULT_BRANCH}; tracked release refs were not synced."
            exit 0
          fi
          if ! git rebase "origin/${DEFAULT_BRANCH}"; then
            echo "::warning::Failed to rebase tracked release refs onto ${DEFAULT_BRANCH}; manual sync may be required."
            exit 0
          fi
          if ! git push origin HEAD:"${DEFAULT_BRANCH}"; then
            echo "::warning::Unable to push tracked release refs to ${DEFAULT_BRANCH}; branch protection or token permissions may require a manual sync."
          fi
