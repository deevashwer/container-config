cvm-version: 0.7.5
cpus: 4
memory: 16384

containers:
  - name: "openclaw"
    image: "ghcr.io/deevashwer/container-config-openclaw-runtime:v0.0.15@sha256:7dc76e17d6c47047c3513bba609f9e3b39dc36cf24e4e3dfd37e982155e2da4c"
    env:
      - OPENCLAW_DISABLE_BONJOUR: "1"
      - OPENCLAW_BOOTSTRAP_WAIT_MS: "90000"
  - name: "auth-proxy"
    image: "ghcr.io/deevashwer/container-config-auth-proxy:v0.0.15@sha256:f40b00833915216cb7a48377e6da63cd28b81fd9901ffa5d1a4a636e631bf447"
    env:
      - PORT: "8080"
      - CHALLENGE_TTL_SECONDS: "60"
      - SESSION_TTL_SECONDS: "43200"
      - SESSION_COOKIE_NAME: "openclaw_passkey_session"
      - SESSION_COOKIE_SECURE: "true"
      - OPENCLAW_WORKSPACE_PATH: "/openclaw/"
      - PASSKEY_STORE_PATH: "/var/lib/openclaw-auth/passkeys.json"
      - OPENCLAW_BOOTSTRAP_BASE_URL: "http://127.0.0.1:18788"
      - UPSTREAM_BASE_URL: "http://127.0.0.1:18789"
      - AUX_APPLICATION_BASE_URL: "http://127.0.0.1:3000"
      - AUX_APPLICATION_PATH_PREFIX: "/aux-application"
      - BOOTSTRAP_TIMEOUT_SECONDS: "90"

shim:
  upstream-port: 8080
  paths:
    - /
    - /assets/*
    - /favicon.svg
    - /api/public/*
    - /api/private/*
    - /healthz
    - /openclaw
    - /openclaw/*
    - /aux-application
    - /aux-application/*
