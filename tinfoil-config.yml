cvm-version: 0.7.5
cpus: 2
memory: 8192

containers:
  - name: "openclaw"
    image: "ghcr.io/openclaw/openclaw:2026.4.15-slim@sha256:734b55459a9d2eddd58a493577e1ff867a2680f13758349529bec91a0d2c0ea3"
    entrypoint: ["sh", "-lc"]
    env:
      # Upstream headless Docker deployments have an open Bonjour/mDNS issue.
      - OPENCLAW_DISABLE_BONJOUR: "1"
    command:
      - >-
        set -eu;
        mkdir -p /home/node/.openclaw &&
        node -e 'const fs = require("node:fs"); const token = "1c8a9a2c3982cf74ea81d129ab6fa735e23833f5a5bd46eb90dead02272b1396"; const config = { gateway: { mode: "local", bind: "lan", controlUi: { basePath: "/openclaw", embedSandbox: "strict", dangerouslyAllowHostHeaderOriginFallback: true, dangerouslyDisableDeviceAuth: true }, auth: { mode: "token", token } } }; fs.writeFileSync("/home/node/.openclaw/openclaw.json", JSON.stringify(config)); console.log("[openclaw-tinfoil] public_token=" + token); console.log("[openclaw-tinfoil] open the public deployment URL at /openclaw/#token=" + token);' &&
        exec docker-entrypoint.sh node openclaw.mjs gateway --allow-unconfigured

shim:
  upstream-port: 18789
  paths:
    - /openclaw
    - /openclaw/
    - /openclaw/assets/*
    - /openclaw/favicon.svg
    - /openclaw/favicon-32.png
    - /openclaw/apple-touch-icon.png
