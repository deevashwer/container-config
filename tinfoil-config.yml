cvm-version: 0.7.5
cpus: 4
memory: 16384

containers:
  - name: "openclaw"
    image: "ghcr.io/deevashwer/container-config-openclaw-runtime:v0.0.12@sha256:49237de601dcf931ebe48404b86d654fb2cd79ce5e8fa99665740743a5cb70d9"
    env:
      - OPENCLAW_DISABLE_BONJOUR: "1"
      - OPENCLAW_BOOTSTRAP_WAIT_MS: "90000"
  - name: "auth-proxy"
    image: "ghcr.io/deevashwer/container-config-auth-proxy:v0.0.12@sha256:b3bbb75d04635e05e6c993b221bcf049c5abd3edabe0c8355d707747c984a11b"
    env:
      - PORT: "8080"
      - CHALLENGE_TTL_SECONDS: "60"
      - SESSION_TTL_SECONDS: "43200"
      - SESSION_COOKIE_NAME: "openclaw_passkey_session"
      - SESSION_COOKIE_SECURE: "true"
      - OPENCLAW_WORKSPACE_PATH: "/openclaw/"
      - PASSKEY_STORE_PATH: "/var/lib/openclaw-auth/passkeys.json"
      - OPENCLAW_BOOTSTRAP_BASE_URL: "http://127.0.0.1:18788"
      - UPSTREAM_BASE_URL: "http://127.0.0.1:18789"
      - AUX_APPLICATION_BASE_URL: "http://127.0.0.1:3000"
      - AUX_APPLICATION_PATH_PREFIX: "/aux-application"
      - BOOTSTRAP_TIMEOUT_SECONDS: "90"

shim:
  upstream-port: 8080
  paths:
    - /
    - /assets/*
    - /favicon.svg
    - /api/public/*
    - /api/private/*
    - /healthz
    - /openclaw
    - /openclaw/*
    - /aux-application
    - /aux-application/*
