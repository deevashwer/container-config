cvm-version: 0.7.5
cpus: 4
memory: 16384

containers:
  - name: "openclaw"
    image: "ghcr.io/deevashwer/openclaw-runtime:v0.0.8@sha256:737356a7410c69e68c932d413b78ed282d18025ab3777a0f79492b633c15fb9d"
    env:
      - OPENCLAW_DISABLE_BONJOUR: "1"
      - OPENCLAW_BOOTSTRAP_WAIT_MS: "90000"
  - name: "auth-proxy"
    image: "ghcr.io/deevashwer/openclaw-auth-proxy:v0.0.8@sha256:c0910cc904d38f1c74ef12caa37ce0a6bfc8435dacd589b3fda40ee1dc0aba98"
    env:
      - PORT: "8080"
      - CHALLENGE_TTL_SECONDS: "60"
      - SESSION_TTL_SECONDS: "43200"
      - SESSION_COOKIE_NAME: "openclaw_owner_session"
      - SESSION_COOKIE_SECURE: "true"
      - OPENCLAW_WORKSPACE_PATH: "/openclaw/"
      - OWNER_PUBLIC_KEY_JWK: '{"crv":"P-256","kty":"EC","x":"WUvrTCSyyHsHKjAhmv5wHJV6JNvOtqSzUElseK3cSiE","y":"uJ7iTfQX-s8OOX7KXuQ5eBB5aDK5dWujLKrI_qe2Vr0"}'
      - OPENCLAW_BOOTSTRAP_BASE_URL: "http://127.0.0.1:18788"
      - UPSTREAM_BASE_URL: "http://127.0.0.1:18789"
      - AUX_APPLICATION_BASE_URL: "http://127.0.0.1:3000"
      - AUX_APPLICATION_PATH_PREFIX: "/aux-application"
      - BOOTSTRAP_TIMEOUT_SECONDS: "90"

shim:
  upstream-port: 8080
  paths:
    - /
    - /assets/*
    - /favicon.svg
    - /api/public/*
    - /api/private/*
    - /healthz
    - /openclaw
    - /openclaw/*
    - /aux-application
    - /aux-application/*
