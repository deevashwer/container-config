cvm-version: 0.7.5
cpus: 2
memory: 8192

containers:
  - name: "openclaw"
    image: "ghcr.io/openclaw/openclaw:2026.4.15-slim@sha256:734b55459a9d2eddd58a493577e1ff867a2680f13758349529bec91a0d2c0ea3"
    entrypoint: ["sh", "-lc"]
    env:
      # Upstream headless Docker deployments have an open Bonjour/mDNS issue.
      - OPENCLAW_DISABLE_BONJOUR: "1"
    secrets:
      - OPENCLAW_GATEWAY_TOKEN
      - OPENCLAW_CONTROL_UI_ORIGIN
    command:
      - >-
        set -eu;
        [ -n "${OPENCLAW_GATEWAY_TOKEN:-}" ] || { echo >&2 "OPENCLAW_GATEWAY_TOKEN is required"; exit 1; };
        [ -n "${OPENCLAW_CONTROL_UI_ORIGIN:-}" ] || { echo >&2 "OPENCLAW_CONTROL_UI_ORIGIN is required"; exit 1; };
        mkdir -p /home/node/.openclaw &&
        node -e 'const fs = require("node:fs"); const rawOrigin = (process.env.OPENCLAW_CONTROL_UI_ORIGIN || "").trim(); let normalizedOrigin; try { const parsed = new URL(rawOrigin); if (parsed.protocol !== "https:") { throw new Error("OPENCLAW_CONTROL_UI_ORIGIN must use https"); } normalizedOrigin = parsed.origin; } catch (error) { console.error(String(error)); process.exit(1); } const config = { gateway: { mode: "local", bind: "lan", controlUi: { basePath: "/openclaw", embedSandbox: "strict", allowedOrigins: [normalizedOrigin], dangerouslyDisableDeviceAuth: true }, auth: { mode: "token" } } }; fs.writeFileSync("/home/node/.openclaw/openclaw.json", JSON.stringify(config));' &&
        exec docker-entrypoint.sh node openclaw.mjs gateway --allow-unconfigured

shim:
  upstream-port: 18789
  paths:
    - /openclaw
    - /openclaw/
    - /openclaw/assets/*
    - /openclaw/favicon.svg
    - /openclaw/favicon-32.png
    - /openclaw/apple-touch-icon.png
    - /openclaw/chat
    - /openclaw/overview
    - /openclaw/channels
    - /openclaw/instances
    - /openclaw/sessions
    - /openclaw/usage
    - /openclaw/cron
    - /openclaw/agents
    - /openclaw/skills
    - /openclaw/nodes
    - /openclaw/config
    - /openclaw/communications
    - /openclaw/appearance
    - /openclaw/automation
    - /openclaw/infrastructure
    - /openclaw/ai-agents
    - /openclaw/debug
    - /openclaw/logs
    - /openclaw/dreaming
    - /openclaw/dreams
